name: Build and Release Standalone EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Pre-download FFmpeg for bundling
      run: |
        python -c "from app.downloader import download_ffmpeg; download_ffmpeg()"
        
    - name: Build Standalone EXE with PyInstaller
      env:
        PYTHONUTF8: 1
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "bin;bin" --add-data "static;static" main.py
        
    - name: Rename executable
      run: |
        mv dist/main.exe dist/youtube_downloader.exe
        
    - name: Release Latest on Main Push
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/youtube_downloader.exe
        tag_name: latest
        name: Latest Development Build
        body: "Автоматическая сборка из ветки main. Включает встроенный FFmpeg."
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Release Version on Tag Push
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/youtube_downloader.exe
        name: Release ${{ github.ref_name }}
        body: "Стабильный релиз версии ${{ github.ref_name }}. Включает встроенный FFmpeg."
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
